# --- Prefix ---
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# --- General ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0
setw -g aggressive-resize on
set -g set-clipboard on
set -g allow-passthrough on
set -g detach-on-destroy off

# True color + undercurl support for Ghostty
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# --- Keybindings ---
setw -g mode-keys vi

# Pane splits (intuitive keys, inherit cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (prefix, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# No-prefix pane resizing (Ctrl+Alt+Shift+arrows)
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Quick pane/window kill
bind x kill-pane
bind X kill-window

# New window inherits cwd
bind c new-window -c "#{pane_current_path}"

# No-prefix window switching (Alt+1-9)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# No-prefix window cycling and reordering
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# No-prefix pane navigation (Ctrl+Alt+arrows)
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# Session controls
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind N switch-client -n
bind P switch-client -p
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# Vi copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell "command -v pbcopy" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
}

# Mouse scroll: pass through to alternate-screen TUI apps (smoother than arrow keys)
bind -T root WheelUpPane   if-shell -Ft= "#{alternate_on}" "send-keys -M" "select-pane -t= ; copy-mode -e ; send-keys -M"
bind -T root WheelDownPane if-shell -Ft= "#{alternate_on}" "send-keys -M" "select-pane -t= ; send-keys -M"

# Open a bare Ghostty window (no tmux) — useful for SSH sessions
bind G run-shell "open -na Ghostty --args -e env DOTFILES_NO_TMUX=1 zsh -l"

# Quick reload and rename
bind q source-file ~/.tmux.conf \; display "Config reloaded"
bind r command-prompt -I "#W" "rename-window -- '%%'"

# --- Status bar ---
set -g status-position top

# --- Theme: Catppuccin (Everforest Dark Hard colors) ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Override Catppuccin Mocha palette with Everforest Dark Hard colors
# Uses @thm_ variables which the plugin reads internally via -ogq (set-if-unset)
set -g @thm_bg "#1e2326"
set -g @thm_fg "#d3c6aa"
set -g @thm_rosewater "#e69875"
set -g @thm_flamingo "#e67e80"
set -g @thm_pink "#d699b6"
set -g @thm_mauve "#d699b6"
set -g @thm_red "#e67e80"
set -g @thm_maroon "#f85552"
set -g @thm_peach "#e69875"
set -g @thm_yellow "#dbbc7f"
set -g @thm_green "#a7c080"
set -g @thm_teal "#83c092"
set -g @thm_sky "#7fbbb3"
set -g @thm_sapphire "#7fbbb3"
set -g @thm_blue "#3a94c5"
set -g @thm_lavender "#7fbbb3"
set -g @thm_subtext_1 "#d3c6aa"
set -g @thm_subtext_0 "#a6b0a0"
set -g @thm_overlay_2 "#a6b0a0"
set -g @thm_overlay_1 "#7a8478"
set -g @thm_overlay_0 "#7a8478"
set -g @thm_surface_2 "#374145"
set -g @thm_surface_1 "#2e383c"
set -g @thm_surface_0 "#272e33"
set -g @thm_mantle "#1e2326"
set -g @thm_crust "#1e2326"

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -g status-right-length 100

set -g @catppuccin_window_number_color "#7a8478"
set -g @catppuccin_window_current_number_color "#a7c080"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Resurrect + Continuum
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

if-shell "[ -f /opt/homebrew/opt/tpm/share/tpm/tpm ]" {
  run '/opt/homebrew/opt/tpm/share/tpm/tpm'
} {
  run '~/.tmux/plugins/tpm/tpm'
}
